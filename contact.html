<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body style="background-image: url('contact.jpeg'); 
             background-size: cover; 
             background-repeat: no-repeat;">
    <div class="myForm">
        <form id="myForm">
            <label for="name" required style="color: rgb(239, 190, 66);">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="email" required style="color: rgb(239, 190, 66);">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="message" required style="color: rgb(239, 190, 66);">Message:</label><br>
            <textarea id="message" name="message" required></textarea><br><br>
            <input type="submit" value="Submit" id="Store">
        </form>
    </div>
    <p id="greet" style="color: rgb(239, 190, 66);"></p>
    <p id="hello" style="color: rgb(239, 190, 66);"></p>
    <p id="effect" style="color: rgb(239, 190, 66);"></p>
    <script src="contact.js"></script>
</body>
</html>
